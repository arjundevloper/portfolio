<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Arjun Bhadauria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="icon" type="image/x-icon" href="assets/panther.ico">
</head>

<body>

    <div class="noise"></div>

    <header>
        <a class="logo" href="index.html">MEOW</a>
        <nav>
            <a href="index.html">Home</a>
            <a class="active" href="projects.html">Projects</a>
            <a href="art.html">Art</a>
            <a href="blog.html">Blog</a>
        </nav>
        <button class="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <nav class="nav-drawer">
        <a href="index.html">Home</a>
        <a class="active" href="projects.html">Projects</a>
        <a href="art.html">Art</a>
    </nav>

    <!-- Page Hero -->
    <div class="page-hero">
        <div class="page-glow"></div>
        <div class="page-hero-tag">Selected Work</div>
        <h1>Projects</h1>
        <p>A collection of things I've built — from interactive experiments to full digital experiences.</p>
    </div>

    <!-- Projects Grid -->
    <div class="section">
        <div class="section-label">All Projects</div>
        <div class="card-grid" id="projects-grid">

            <!-- Dynamic project cards will be injected here by JavaScript -->          

        </div>
    </div>

    <footer>
        <span>© 2025 Arjun Bhadauria</span>
        <nav class="footer-nav">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="art.html">Art</a>
            <a href="blog.html">Blog</a>
        </nav>
    </footer>

    <script src="main.js"></script>
    <script src="projects-data.js"></script>
    <script>
        // Dynamically render project cards
        const grid = document.getElementById('projects-grid');
        projects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgUrl = `https://raw.githubusercontent.com/${p.repo}/main/project.webp`;
            card.innerHTML = `
                <div class="card-thumb">
                    <img src="${imgUrl}" alt="${p.title} screenshot" class="card-thumb-img" style="width:100%;height:100%;object-fit:cover;"/>
                </div>
                <div class="card-body">
                    <div class="card-tag">${p.tag}</div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.desc}</div>
                </div>
                <div class="card-footer">
                    <span class="card-date">${p.date}</span>
                    <a href="${p.link}" class="card-link" ${p.linkTarget ? 'target="_blank" rel="noopener"' : ''}>${p.linkText}</a>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>

</html>
